name: IliRepoValidation

on: 
  workflow_dispatch:

jobs:
  validate-IliRepo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'adopt'
      - name: verify java Version
        run: java --version
      - name: run iliManager
        run: |
          SET LocalDate=%DATE:~-4%%DATE:~-7,2%%DATE:~-10,2%
          java -jar ili2c/ili2c.jar" --check-repo-ilis https://raw.githubusercontent.com/ch-sz-geo/Test_models
