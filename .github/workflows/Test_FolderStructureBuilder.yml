name: Test Ordneraufbau

on: 
  push:
    branches: [main]
    paths: 
      - 'repository/**'
  workflow_dispatch:

jobs:
  manage-Ili:
    runs-on: ubuntu-latest

    permissions: 
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'adopt'
          
      - name: verify java Version
        run: java --version
        
      - name: ilimanagerInstalation
        uses: ch-sz-geo/interlis-setup-action/setup-ilimanager@v1
        with:
          path: ../ilimanager

      - name: getComitHistory
        run: |
          set -euo pipefail

          GIT_URL="https://raw.githubusercontent.com/ch-sz-geo/Test_models/"
          REF=$(git rev-parse --abbrev-ref HEAD)
          echo "Scanning branch: $REF"
          
          GIT_LOG_ARGS="--format=%H|||%as|||%an|||%s"
         
          while IFS='|||' read -r sha date author subject; do
              [ -z "$sha" ] && continue

              # Get parent (empty string for initial commit)
              PARENT=$(git rev-parse --verify "${sha}^" 2>/dev/null || echo "")

              if [ -z "$PARENT" ]; then
                FILES=$(git diff-tree --no-commit-id -r --name-status "$sha" 2>/dev/null || true)
              else
                FILES=$(git diff --name-status "$PARENT" "$sha" 2>/dev/null || true)
              fi
              
              [ -z "$FILES" ] && continue  # skip empty merges
              
                echo "## \`${sha:0:8}\` — $date"
                echo ""
                echo "**Author:** $author  "
                echo "**Message:** $subject  "
                echo "**Full SHA:** \`$sha\`"
                echo ""
                echo "| Status | File |"
                echo "|--------|------|"
                while IFS=$'\t' read -r status filepath; do
                  [ -z "$status" ] && continue
                  case "$status" in
                    A*) label="Added" ;;
                    M*) label="Modified" ;;
                    D*) label="Deleted" ;;
                    R*) label="Renamed" ;;
                    C*) label="Copied" ;;
                    T*) label="Type changed" ;;
                    *)  label="$status" ;;
                  esac
                  echo "| $label | \`$filepath\` |"
                  mkdir -p "./$sha/$(dirname "$filepath")"
                  curl "$GIT_URL/$sha/$filepath" -o "./$sha/$filepath"
                  echo "./$sha/$filepath"
                  
                done <<< "$FILES"
                
              
          done < <(git log $GIT_LOG_ARGS)
          echo "done"
          ls
