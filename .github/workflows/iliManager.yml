name: IliManagement

on: 
  push:
    branches: [main]
    paths: 
      - 'repository/**'
  workflow_dispatch:

jobs:
  manage-Ili:
    runs-on: ubuntu-latest

    permissions: 
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'adopt'
          
      - name: verify java Version
        run: java --version
        
      - name: ilimanagerInstalation
        uses: ch-sz-geo/interlis-setup-action/setup-ilimanager@v1
        with:
          path: ../ilimanager

      - name: getComitHistory
        run: |
           set -euo pipefail

           MAX_COMMITS="0"
           GIT_URL="https://raw.githubusercontent.com/ch-sz-geo/Test_models/"

           # Determine the ref to scan
           if [ -z "$BRANCH" ]; then
             REF=$(git rev-parse --abbrev-ref HEAD)
           else
             REF="$BRANCH"
           fi

           echo "Scanning branch: $REF"
           echo "Output format:   $FORMAT"
           echo "Max commits:     ${MAX_COMMITS:-all}"

           # Build the git log command
           GIT_LOG_ARGS="--format=%H|||%as|||%an|||%s"
           if [ "$MAX_COMMITS" -gt 0 ] 2>/dev/null; then
             GIT_LOG_ARGS="$GIT_LOG_ARGS -n $MAX_COMMITS"
           fi
          
          
      - name: run iliManager
        run: |
          java -jar ../ilimanager/ilimanager.jar --updateIliModels --out ilimodels.xml --repos ./
          echo "parent:"
          ls ..
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git status
          git add ilimodels.xml
          git commit -am "Created or Updated and Added ilimodels.xml"
          git push origin main
